<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000; /* Preto puro */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .form-container {
            background: #111;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.3);
            border: 2px solid #ff0000; /* Borda vermelha */
            width: 100%;
            max-width: 400px;
            color: #fff;
        }

        h2 {
            text-align: center;
            color: #ff0000; /* Título vermelho */
            margin-bottom: 30px;
            font-size: 1.8em;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #222;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff0000; /* Borda vermelha no foco */
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        input::placeholder {
            color: #888;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #ff0000; /* Botão vermelho */
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #cc0000; /* Vermelho mais escuro no hover */
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Formulário de Cadastro</h2>
        
        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            
            <label for="pagamento">Forma de Pagamento:</label>
            <select id="pagamento" name="pagamento" required>
                <option value="">Selecione uma opção</option>
                <option value="cartao">Cartão de Crédito</option>
                <option value="boleto">Boleto</option>
                <option value="pix">Pix</option>
                <option value="paypal">PayPal</option>
            </select>
            
            <button type="submit">Enviar</button>
        </form>
    </div>
</body>
</html>
