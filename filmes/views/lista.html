<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias de Filmes</title>
    <style>
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        table {
            width: 90%;
            max-width: 600px;
            border-collapse: collapse;
            background: #000;
            color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        th, td {
            padding: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        th {
            background: #333;
            font-size: 1.2em;
            font-weight: bold;
        }

        .btn-categoria {
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }

        .btn-categoria:hover {
            background: #ee5a24;
        }

        tr:nth-child(even) {
            background: #111;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Categorias de Filmes</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Ação</td>
                <td><a href="/formulario" class="btn-categoria">Ver Filmes</a></td>
            </tr>
            <tr>
                <td>Comédia</td>
                <td><a href="/formulario" class="btn-categoria">Ver Filmes</a></td>
            </tr>
            <tr>
                <td>Drama</td>
                <td><a href="/formulario" class="btn-categoria">Ver Filmes</a></td>
            </tr>
            <tr>
                <td>Ficção Científica</td>
                <td><a href="/formulario" class="btn-categoria">Ver Filmes</a></td>
            </tr>
            <tr>
                <td>Terror</td>
                <td><a href="/formulario" class="btn-categoria">Ver Filmes</a></td>
            </tr>
            <tr>
                <td>Romance</td>
                <td><a href="/formulario" class="btn-categoria">Ver Filmes</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
